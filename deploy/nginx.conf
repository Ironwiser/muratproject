# muratproje - Nginx (frontend-only)
# root: /var/www/muratproje/dist

server {
    listen 80;
    listen [::]:80;
    server_name muratproje.omurgenc.dev;

    root /var/www/muratproje/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
